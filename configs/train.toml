[data]
data_root = "data/BCCD_processado"

[training]
epochs = 50
batch_size = 1
num_workers = 0
seed = 42
augment = true
# device = "cuda"

[augmentation]
strategies = ["paper"]

[optimizer]
lr = 0.01
momentum = 0.99
# weight_decay and nesterov not used (not mentioned in the original paper)

# [scheduler]
# Disabled by default: the original U-Net paper uses a fixed learning rate.
# Uncomment and set use_scheduler = true to re-enable StepLR decay.
# use_scheduler = true
# step_size = 10
# gamma = 0.5

[output]
output_dir = "runs/unet"
checkpoint_every = 5
final_model_name = "unet_final.pth"
